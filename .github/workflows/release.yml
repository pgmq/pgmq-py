name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  extension-tests:
    runs-on: ubuntu-latest
    if: github.repository == 'pgmq/pgmq-py'
    services:
      pgmq:
        image: ghcr.io/pgmq/pg18-pgmq:latest
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      plain-postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      PG_SQL_INSTALL_HOST: localhost
      PG_SQL_INSTALL_PORT: "5433"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.13

      - name: Install project
        run: uv sync --all-groups --all-extras

      - name: Extension and SQL install unit tests
        run: make test-env

  sql-install-tests:
    uses: ./.github/workflows/sql_install_tests.yml
    if: github.repository == 'pgmq/pgmq-py'

  publish:
    runs-on: ubuntu-latest
    needs: [extension-tests, sql-install-tests]
    if: github.repository == 'pgmq/pgmq-py'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.13

      - name: Install project
        run: uv sync --all-groups --all-extras

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*