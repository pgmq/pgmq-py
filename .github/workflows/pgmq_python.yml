name: pgmq-python CI workflow

defaults:
  run:
    shell: bash
    working-directory: ./

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pgmq_python.yml"
      - ".github/workflows/sql_install_tests.yml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "Makefile"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pgmq_python.yml"
      - ".github/workflows/sql_install_tests.yml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "Makefile"

jobs:
  lints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Install project
        run: uv sync --all-groups
      - name: Lints / Type Checking
        run: make lint

  extension-tests:
    runs-on: ubuntu-latest
    services:
      pgmq:
        image: ghcr.io/pgmq/pg18-pgmq:latest
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      plain-postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      PG_SQL_INSTALL_HOST: localhost
      PG_SQL_INSTALL_PORT: "5433"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Install project
        run: uv sync --all-groups --all-extras
      - name: Extension and SQL install unit tests
        run: make test-env

  sql-install-tests:
    uses: ./.github/workflows/sql_install_tests.yml