name: Docs

defaults:
  run:
    shell: bash
    working-directory: ./

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'pgmq/pgmq-py'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs (main)
        if: github.ref == 'refs/heads/main'
        run: uv run --group docs mike deploy --push --update-aliases main latest

      - name: Deploy docs (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run --group docs mike deploy --push --update-aliases "$VERSION" latest

      - name: Set default version
        run: uv run --group docs mike set-default --push latest
