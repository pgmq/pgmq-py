name: Vendor PGMQ SQL

# Keeps bundled pgmq.sql aligned with https://github.com/pgmq/pgmq releases.
#
# Triggers (either can open the vendor PR if the other missed or failed):
# 1. repository_dispatch from pgmq/pgmq (optional upstream hook)
# 2. Daily cron polling the extension repo's latest release
# 3. workflow_dispatch for manual runs
#
# See docs/development.md for setup and verification.

on:
  schedule:
    - cron: "0 6 * * *"
  repository_dispatch:
    types: [pgmq-extension-release]
  workflow_dispatch:
    inputs:
      tag:
        description: PGMQ extension release tag (e.g. v1.11.1)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  vendor-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Resolve extension release
        id: meta
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          ARGS=(--github-output --trigger "${{ github.event_name }}")
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${DISPATCH_TAG:-$DISPATCH_VERSION}"
            if [ -z "$TAG" ]; then
              echo "repository_dispatch requires client_payload.tag or .version"
              exit 1
            fi
            ARGS+=(--tag "$TAG")
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARGS+=(--tag "${{ inputs.tag }}")
          fi
          uv run python scripts/pgmq_extension_release_status.py "${ARGS[@]}"

      - name: Bundled SQL already current
        if: steps.meta.outputs.needs_update != 'true'
        run: |
          echo "Bundled SQL is already at ${{ steps.meta.outputs.version }}; nothing to do."

      - name: Vendor pgmq.sql from extension release
        if: steps.meta.outputs.needs_update == 'true'
        run: uv run python scripts/vendor_pgmq_sql.py "${{ steps.meta.outputs.tag }}"

      - name: Verify bundled SQL version
        if: steps.meta.outputs.needs_update == 'true'
        run: |
          uv run python - <<'PY'
          from pgmq.install import get_embedded_sql_version
          expected = "${{ steps.meta.outputs.version }}"
          actual = get_embedded_sql_version()
          if actual != expected:
              raise SystemExit(f"Expected bundled version {expected}, got {actual}")
          print(f"Bundled SQL version OK: {actual}")
          PY

      - name: Run SQL install tests
        if: steps.meta.outputs.needs_update == 'true'
        run: uv run python -m unittest tests.test_install.TestEmbeddedInstallSql -v

      - name: Create pull request
        if: steps.meta.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: vendor/pgmq-sql-${{ steps.meta.outputs.version }}
          delete-branch: true
          title: "chore: vendor pgmq.sql from PGMQ extension ${{ steps.meta.outputs.tag }}"
          body: |
            Automated update triggered by `${{ steps.meta.outputs.trigger }}` for PGMQ extension release `${{ steps.meta.outputs.tag }}`.

            - Source: [pgmq/pgmq](https://github.com/pgmq/pgmq) @ `${{ steps.meta.outputs.tag }}`
            - Bundled file: `src/pgmq/sql/pgmq.sql`

            This workflow also runs on a daily schedule so a missed upstream dispatch
            is picked up automatically.

            Merge after review, then cut a `pgmq-py` release so PyPI users receive the new SQL.
          commit-message: "chore: vendor pgmq.sql from PGMQ extension ${{ steps.meta.outputs.tag }}"
          labels: dependencies,sql