site_name: PGMQ Python
site_description: Official Python client for the PGMQ PostgreSQL extension
site_url: https://pgmq.github.io/pgmq-py/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: light mode
  features:
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - SQL Installation: sql_installation.md
  - Configuration: configuration.md
  - Clients: clients.md
  - Queue Management: queue_management.md
  - Messages: messages.md
  - Sending Messages: sending_messages.md
  - Reading Messages: reading_messages.md
  - Deleting and Archiving: deleting_and_archiving.md
  - Visibility Timeout: visibility_timeout.md
  - Topic Routing: topic_routing.md
  - Metrics: metrics.md
  - Notifications: notifications.md
  - Transactions: transactions.md
  - Logging: logging.md
  - Utilities: utilities.md
  - Backward Compatibility: backward_compatibility.md
  - Development: development.md

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - admonition
  - tables

plugins:
  - search
  - mkdocstrings

extra:
  version:
    provider: mike
